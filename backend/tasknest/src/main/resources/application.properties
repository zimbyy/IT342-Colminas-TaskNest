# H2 Database Configuration (for development/testing)
spring.datasource.url=jdbc:h2:mem:tasknest
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# For Supabase PostgreSQL configuration, see SUPABASE_SETUP.md
# To use Supabase: replace this entire file with the configuration in SUPABASE_SETUP.md