# Optional local secrets loader (ignored if file missing)
spring.config.import=optional:file:.env.supabase[.properties]

# H2 Database Configuration (for development)
spring.datasource.url=jdbc:h2:mem:tasknest
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Supabase/PostgreSQL profile lives in application-supabase.properties
# Run with "SPRING_PROFILES_ACTIVE=supabase" (or --spring.profiles.active=supabase)
# and set SUPABASE_DB_URL/SUPABASE_DB_USER/SUPABASE_DB_PASSWORD env vars.